# GregTech Access Transformer
# NeoForge 1.21.x format – uses Mojang Official Mapping names
#
# NOTE: The original 1.7.10 entries referenced SRG/MCP obfuscated names and
# 1.7.10 class paths.  All entries have been translated to Mojang Official
# Mapping names for 1.21.x.  Entries are updated incrementally as each
# class is encountered during Phase 2-4 migration.
#
# Format:
#   <access modifier> <fully-qualified class name> [<field or method descriptor>]
#
# Examples:
#   public net.minecraft.world.level.block.Block descriptionId  (field)
#   public net.minecraft.world.entity.monster.EnderMan shouldTeleportRandomly()Z  (method)
#   public-f net.minecraft.world.level.block.Block descriptionId  (make field public AND non-final)
#

